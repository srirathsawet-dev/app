<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>POS Scanner</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@400;500;600;700;800;900&family=Space+Grotesk:wght@600;700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
<style>
:root{
  --bg:#f2f2f7;--card:#fff;--text:#111827;--muted:#6b7280;--line:#e5e7eb;
  --blue:#007aff;--blue2:#0057d9;--green:#34c759;--orange:#ff9500;--red:#ff3b30;
  --shadow:0 14px 38px rgba(15,23,42,.12);--radius:28px;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}html,body{margin:0;height:100%;font-family:'Noto Sans Thai',system-ui,sans-serif;background:var(--bg);color:var(--text);overscroll-behavior:none}button,input{font-family:inherit}button{border:0;background:none;cursor:pointer}.num{font-family:'Space Grotesk','Noto Sans Thai',sans-serif;font-variant-numeric:tabular-nums}#app{height:100dvh;display:flex;flex-direction:column;overflow:hidden}.top{padding:14px 18px 10px;display:flex;align-items:center;justify-content:space-between;gap:12px}.brand{min-width:0}.brand h1{font-size:22px;line-height:1.1;margin:0;font-weight:900;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.brand p{margin:3px 0 0;color:var(--muted);font-size:13px}.pill{border-radius:999px;background:#fff;padding:10px 14px;font-weight:800;color:var(--blue);box-shadow:0 4px 14px rgba(0,0,0,.06)}.main{flex:1;min-height:0;padding:8px 14px 14px;display:grid;grid-template-columns:minmax(420px,1.25fr) minmax(360px,.75fr);gap:14px}.scanner,.cart{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden;min-height:0;display:flex;flex-direction:column}.scan-head{padding:16px 18px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--line)}.scan-title{font-size:18px;font-weight:900}.camera-actions{display:flex;gap:8px}.small-btn{padding:9px 12px;border-radius:999px;background:#f3f4f6;color:#374151;font-weight:800}.small-btn.blue{background:#e8f2ff;color:var(--blue)}.small-btn.red{background:#ffecec;color:var(--red)}.camera-box{position:relative;flex:1;min-height:0;background:#020617;display:flex;align-items:center;justify-content:center;padding:12px}#qr-reader{width:100%;height:100%;border-radius:22px;overflow:hidden;background:#000}#qr-reader video{width:100%!important;height:100%!important;object-fit:cover!important}.scan-frame{position:absolute;inset:50%;width:min(64vw,420px);height:190px;transform:translate(-50%,-50%);border:4px solid rgba(255,255,255,.9);border-radius:24px;box-shadow:0 0 0 9999px rgba(0,0,0,.22);pointer-events:none}.scan-line{position:absolute;left:12%;right:12%;top:50%;height:3px;background:var(--green);border-radius:999px;box-shadow:0 0 14px var(--green);animation:line 1.8s ease-in-out infinite}@keyframes line{0%,100%{transform:translateY(-70px)}50%{transform:translateY(70px)}}.scan-bottom{padding:14px 18px;display:flex;align-items:center;justify-content:space-between;gap:10px;border-top:1px solid var(--line)}.status{font-weight:800}.last{color:var(--muted);font-size:13px;text-align:right;max-width:55%;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.cart-head{padding:18px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--line)}.cart-head h2{font-size:20px;margin:0;font-weight:900}.clear{color:var(--red);font-weight:800}.items{flex:1;overflow:auto;padding:8px 14px}.empty{text-align:center;color:var(--muted);padding:60px 18px;font-weight:700}.row{display:grid;grid-template-columns:1fr auto auto;gap:10px;align-items:center;padding:13px 4px;border-bottom:1px solid #f1f5f9}.name{font-weight:900;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.meta{font-size:12px;color:var(--muted);margin-top:2px}.qty{display:flex;align-items:center;background:#f3f4f6;border-radius:14px;overflow:hidden}.qty button{width:34px;height:34px;font-size:20px;font-weight:900;color:var(--blue)}.qty span{min-width:28px;text-align:center;font-weight:900}.sub{font-weight:900;text-align:right;min-width:78px}.total{border-top:1px solid var(--line);padding:16px 18px calc(18px + env(safe-area-inset-bottom));background:rgba(255,255,255,.96)}.total-row{display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:12px}.total-row .lbl{color:var(--muted);font-weight:800}.total-row .amt{font-size:40px;font-weight:900;color:var(--blue);line-height:1}.pay{display:grid;grid-template-columns:1fr 1fr;gap:10px}.pay button{border-radius:22px;padding:18px 8px;color:#fff;font-size:18px;font-weight:900;box-shadow:0 8px 18px rgba(0,0,0,.12)}.cash{background:var(--green)}.qr{background:var(--blue)}.pay button:disabled{background:#cbd5e1;color:#64748b;box-shadow:none}.overlay{position:fixed;inset:0;background:rgba(0,0,0,.36);z-index:50;display:none;align-items:flex-end;justify-content:center}.overlay.show{display:flex}.sheet{width:100%;max-width:480px;background:#fff;border-radius:28px 28px 0 0;padding:20px 20px calc(20px + env(safe-area-inset-bottom));box-shadow:0 -14px 40px rgba(0,0,0,.18)}.sheet-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}.sheet-head h3{margin:0;font-size:20px;font-weight:900}.x{font-size:24px;color:var(--muted);width:38px;height:38px;border-radius:50%;background:#f3f4f6}.cash-total,.qr-total{text-align:center;margin:8px 0 14px}.cash-total .amt,.qr-total .amt{font-size:38px;font-weight:900;color:var(--blue)}.cash-display{background:#f3f4f6;border-radius:22px;padding:16px;text-align:right;font-size:34px;font-weight:900;margin-bottom:8px}.change{text-align:right;min-height:22px;font-weight:900}.change.ok{color:var(--green)}.change.bad{color:var(--red)}.pad{display:grid;grid-template-columns:repeat(3,1fr);gap:9px;margin-top:12px}.pad button{background:#f3f4f6;border-radius:18px;padding:17px 0;font-size:22px;font-weight:900}.confirm{width:100%;border-radius:22px;padding:18px;margin-top:12px;background:var(--blue);color:#fff;font-size:18px;font-weight:900}.confirm:disabled{background:#cbd5e1;color:#64748b}.qrwrap{display:flex;justify-content:center;margin:12px 0}.qrwrap img{width:260px;height:260px;object-fit:contain;border-radius:24px;border:1px solid var(--line)}.qrmiss{width:260px;height:260px;border:2px dashed var(--line);border-radius:24px;display:flex;align-items:center;justify-content:center;text-align:center;color:var(--muted);padding:18px}.success{text-align:center}.check{width:78px;height:78px;border-radius:50%;background:var(--green);color:#fff;display:flex;align-items:center;justify-content:center;font-size:42px;margin:4px auto 12px}.toast-wrap{position:fixed;top:14px;left:0;right:0;display:flex;justify-content:center;z-index:90;pointer-events:none}.toast{background:#111827;color:#fff;border-radius:999px;padding:12px 18px;font-weight:800;box-shadow:0 8px 24px rgba(0,0,0,.22)}.toast.error{background:var(--red)}.toast.success{background:var(--green)}.spinner{width:18px;height:18px;border:3px solid rgba(255,255,255,.4);border-top-color:#fff;border-radius:50%;display:inline-block;animation:spin .7s linear infinite;vertical-align:-3px;margin-right:6px}@keyframes spin{to{transform:rotate(360deg)}}
@media (orientation:portrait),(max-width:820px){#app{overflow:auto;height:auto;min-height:100dvh}.main{display:flex;flex-direction:column;padding:8px 12px 12px}.scanner{min-height:52dvh}.cart{min-height:46dvh}.scan-frame{width:78vw;height:170px}.total-row .amt{font-size:36px}.top{position:sticky;top:0;background:rgba(242,242,247,.9);backdrop-filter:blur(16px);z-index:20}}
@media (min-width:700px){.overlay{align-items:center}.sheet{border-radius:28px}}
</style>
</head>
<body>
<div id="app">
  <div class="top"><div class="brand"><h1 id="shopNameLabel">ร้านค้า</h1><p>สแกนบาร์โค้ดต่อเนื่อง • คิดเงินเร็ว</p></div><button class="pill" id="reloadBtn">รีเฟรชสินค้า</button></div>
  <div class="main">
    <section class="scanner">
      <div class="scan-head"><div class="scan-title">กล้องสแกนบาร์โค้ด</div><div class="camera-actions"><button class="small-btn blue" id="startCamBtn">เปิดกล้อง</button><button class="small-btn red" id="stopCamBtn">หยุด</button></div></div>
      <div class="camera-box"><div id="qr-reader"></div><div class="scan-frame"><div class="scan-line"></div></div></div>
      <div class="scan-bottom"><div class="status" id="scanStatus">กำลังเตรียมกล้อง...</div><div class="last" id="scanLast">ยังไม่ได้สแกน</div></div>
    </section>
    <section class="cart">
      <div class="cart-head"><h2>ตะกร้า</h2><button class="clear" id="clearCartBtn">ล้าง</button></div>
      <div class="items" id="cartItems"><div class="empty">สแกนสินค้าเพื่อเพิ่มเข้าตะกร้า</div></div>
      <div class="total"><div class="total-row"><div class="lbl">ยอดชำระ</div><div class="amt num" id="totalAmount">฿0</div></div><div class="pay"><button class="cash" id="payCashBtn" disabled>💵 เงินสด</button><button class="qr" id="payQrBtn" disabled>📱 QR</button></div></div>
    </section>
  </div>
</div>
<div class="overlay" id="cashOverlay"><div class="sheet"><div class="sheet-head"><h3>รับเงินสด</h3><button class="x" id="closeCashBtn">×</button></div><div class="cash-total"><div>ยอดที่ต้องชำระ</div><div class="amt num" id="cashTotalLabel">฿0</div></div><div class="cash-display num" id="cashDisplay">0</div><div class="change" id="cashChange">&nbsp;</div><div class="pad"><button data-k="1">1</button><button data-k="2">2</button><button data-k="3">3</button><button data-k="4">4</button><button data-k="5">5</button><button data-k="6">6</button><button data-k="7">7</button><button data-k="8">8</button><button data-k="9">9</button><button id="exactBtn">พอดี</button><button data-k="0">0</button><button id="cashBackspace">⌫</button></div><button class="confirm" id="confirmCashBtn" disabled>ยืนยันรับเงิน</button></div></div>
<div class="overlay" id="qrOverlay"><div class="sheet"><div class="sheet-head"><h3>QR พร้อมเพย์</h3><button class="x" id="closeQrBtn">×</button></div><div class="qr-total"><div>ยอดที่ต้องชำระ</div><div class="amt num" id="qrTotalLabel">฿0</div></div><div class="qrwrap" id="qrImgWrap"></div><button class="confirm" id="confirmQrBtn">ลูกค้าชำระแล้ว ✓</button></div></div>
<div class="overlay" id="successOverlay"><div class="sheet success"><div class="check">✓</div><h3>ขายสำเร็จ</h3><p id="successSub">เลขที่ขาย —</p><button class="confirm" id="successCloseBtn">เริ่มรายการถัดไป</button></div></div>
<div class="toast-wrap" id="toast-wrap"></div>
<script>
(function(){'use strict';
var SCRIPT_URL=localStorage.getItem('pos_script_url')||(location.href.indexOf('/exec')>-1?location.href.split('?')[0]:'');
var products=[],productByBarcode={},cart={},html5QrCode=null,lastScanCode='',lastScanTime=0,cashEntered='',qrUrl='';
function $(id){return document.getElementById(id)}function THB(n){return '฿'+(Number(n)||0).toLocaleString('th-TH',{maximumFractionDigits:2})}function show(id){$(id).classList.add('show')}function hide(id){$(id).classList.remove('show')}function esc(s){return String(s).replace(/[&<>"']/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]})}function toast(msg,type){var e=document.createElement('div');e.className='toast '+(type||'');e.textContent=msg;$('toast-wrap').appendChild(e);setTimeout(function(){e.remove()},2200)}function beep(ok){try{var c=new(window.AudioContext||window.webkitAudioContext)(),o=c.createOscillator(),g=c.createGain();o.frequency.value=ok?980:220;g.gain.value=.08;o.connect(g);g.connect(c.destination);o.start();setTimeout(function(){o.stop();c.close()},ok?80:200)}catch(e){}}
function api(a){return fetch(SCRIPT_URL+'?action='+a).then(function(r){return r.json()})}function apiPost(p){return fetch(SCRIPT_URL,{method:'POST',headers:{'Content-Type':'text/plain;charset=utf-8'},body:JSON.stringify(p)}).then(function(r){return r.json()})}
function loadSettings(){if(!SCRIPT_URL)return;api('settings').then(function(res){if(res&&res.success){$('shopNameLabel').textContent=res.settings.ShopName||'ร้านค้า';qrUrl=res.settings.QRImageURL||'';renderQrImage(qrUrl)}}).catch(function(){})}
function loadProducts(){if(!SCRIPT_URL){toast('ให้เปิดผ่าน Web App URL หรือใส่ URL ใน localStorage ก่อน','error');return Promise.resolve()}$('scanStatus').textContent='กำลังโหลดสินค้า...';return api('products').then(function(res){if(res&&res.success){products=res.products||[];productByBarcode={};products.forEach(function(p){if(p.barcode)productByBarcode[String(p.barcode).trim()]=p});$('scanStatus').textContent='พร้อมสแกน';toast('โหลดสินค้าแล้ว '+products.length+' รายการ','success')}else{throw new Error((res&&res.error)||'โหลดสินค้าไม่สำเร็จ')}}).catch(function(err){$('scanStatus').textContent='โหลดสินค้าไม่สำเร็จ';toast(String(err.message||err),'error')})}
function cartArray(){return Object.keys(cart).map(function(k){return cart[k]})}function count(){return cartArray().reduce(function(s,i){return s+i.qty},0)}function total(){return cartArray().reduce(function(s,i){return s+i.qty*i.price},0)}
function addToCart(p){var id=String(p.id),ex=cart[id],q=ex?ex.qty:0;if(q+1>Number(p.stock||0)){toast('สินค้าในสต็อกไม่พอ','error');beep(false);return}if(ex)ex.qty++;else cart[id]={id:id,name:p.name,price:Number(p.price||0),stock:Number(p.stock||0),qty:1};renderCart();$('scanLast').textContent='เพิ่ม '+p.name+' • '+THB(p.price);beep(true)}
function changeQty(id,d){var it=cart[id];if(!it)return;var nq=it.qty+d;if(nq<=0)delete cart[id];else if(nq>it.stock){toast('สินค้าในสต็อกไม่พอ','error');return}else it.qty=nq;renderCart()}function renderCart(){var arr=cartArray(),wrap=$('cartItems');if(!arr.length){wrap.innerHTML='<div class="empty">สแกนสินค้าเพื่อเพิ่มเข้าตะกร้า</div>'}else{wrap.innerHTML='';arr.forEach(function(i){var r=document.createElement('div');r.className='row';r.innerHTML='<div><div class="name">'+esc(i.name)+'</div><div class="meta num">'+THB(i.price)+' / ชิ้น</div></div><div class="qty"><button class="minus">−</button><span>'+i.qty+'</span><button class="plus">+</button></div><div class="sub num">'+THB(i.price*i.qty)+'</div>';r.querySelector('.minus').onclick=function(){changeQty(i.id,-1)};r.querySelector('.plus').onclick=function(){changeQty(i.id,1)};wrap.appendChild(r)})}$('totalAmount').textContent=THB(total());$('payCashBtn').disabled=count()===0;$('payQrBtn').disabled=count()===0}
function startCamera(){if(html5QrCode)return;$('scanStatus').textContent='กำลังเปิดกล้อง...';html5QrCode=new Html5Qrcode('qr-reader');var config={fps:12,qrbox:{width:300,height:180},formatsToSupport:[Html5QrcodeSupportedFormats.EAN_13,Html5QrcodeSupportedFormats.EAN_8,Html5QrcodeSupportedFormats.UPC_A,Html5QrcodeSupportedFormats.UPC_E,Html5QrcodeSupportedFormats.CODE_128,Html5QrcodeSupportedFormats.CODE_39,Html5QrcodeSupportedFormats.QR_CODE]};html5QrCode.start({facingMode:'user'},config,onScanSuccess).then(function(){$('scanStatus').textContent='พร้อมสแกน'}).catch(function(){html5QrCode=null;$('scanStatus').textContent='เปิดกล้องไม่สำเร็จ ให้กดอนุญาตใช้กล้อง';toast('เปิดกล้องไม่สำเร็จ','error')})}
function stopCamera(){if(!html5QrCode)return;var q=html5QrCode;html5QrCode=null;q.stop().then(function(){q.clear();$('scanStatus').textContent='หยุดกล้องแล้ว'}).catch(function(){})}
function onScanSuccess(code){code=String(code).trim();var now=Date.now();if(code===lastScanCode&&now-lastScanTime<1400)return;lastScanCode=code;lastScanTime=now;var p=productByBarcode[code];if(!p){$('scanLast').textContent='ไม่พบบาร์โค้ด: '+code;toast('ไม่พบสินค้า','error');beep(false);return}if(Number(p.stock||0)<=0){$('scanLast').textContent=p.name+' หมดสต็อก';toast('สินค้าหมด','error');beep(false);return}addToCart(p)}
function renderQrImage(url){$('qrImgWrap').innerHTML=url?'<img src="'+esc(url)+'" alt="QR">':'<div class="qrmiss">ยังไม่ได้ใส่ QRImageURL ในชีต Settings</div>'}
$('startCamBtn').onclick=startCamera;$('stopCamBtn').onclick=stopCamera;$('reloadBtn').onclick=function(){loadProducts()};$('clearCartBtn').onclick=function(){if(count()&&confirm('ล้างตะกร้า?')){cart={};renderCart()}};
$('payCashBtn').onclick=function(){cashEntered='';$('cashTotalLabel').textContent=THB(total());updateCash();show('cashOverlay')};$('closeCashBtn').onclick=function(){hide('cashOverlay')};document.querySelectorAll('.pad button[data-k]').forEach(function(b){b.onclick=function(){if(cashEntered.length<10){cashEntered+=this.getAttribute('data-k');updateCash()}}});$('cashBackspace').onclick=function(){cashEntered=cashEntered.slice(0,-1);updateCash()};$('exactBtn').onclick=function(){cashEntered=String(total());updateCash()};function updateCash(){var v=Number(cashEntered||0),diff=v-total();$('cashDisplay').textContent=v.toLocaleString('th-TH');var ch=$('cashChange');if(!cashEntered){ch.innerHTML='&nbsp;';ch.className='change'}else if(diff>=0){ch.textContent='เงินทอน '+THB(diff);ch.className='change ok'}else{ch.textContent='ยังขาด '+THB(-diff);ch.className='change bad'}$('confirmCashBtn').disabled=diff<0}
$('payQrBtn').onclick=function(){$('qrTotalLabel').textContent=THB(total());renderQrImage(qrUrl);show('qrOverlay')};$('closeQrBtn').onclick=function(){hide('qrOverlay')};$('confirmCashBtn').onclick=function(){checkout('cash')};$('confirmQrBtn').onclick=function(){checkout('qr')};function checkout(type){var items=cartArray().map(function(i){return{id:i.id,qty:i.qty}});if(!items.length)return;var btn=type==='cash'?$('confirmCashBtn'):$('confirmQrBtn'),old=btn.textContent;btn.disabled=true;btn.innerHTML='<span class="spinner"></span>กำลังบันทึก';apiPost({action:'checkout',items:items,paymentType:type}).then(function(res){if(res&&res.success){hide('cashOverlay');hide('qrOverlay');$('successSub').textContent='เลขที่ขาย '+res.saleId+' • '+(type==='cash'?'เงินสด':'QR');show('successOverlay');(res.items||[]).forEach(function(line){var p=products.find(function(x){return String(x.id)===String(line.id)});if(p)p.stock-=line.qty});cart={};renderCart()}else{toast((res&&res.error)||'ทำรายการไม่สำเร็จ','error');if(res&&res.insufficient)loadProducts()}}).catch(function(){toast('เชื่อมต่อไม่สำเร็จ','error')}).finally(function(){btn.disabled=false;btn.textContent=old})}
$('successCloseBtn').onclick=function(){hide('successOverlay');startCamera()};window.addEventListener('beforeunload',stopCamera);
loadSettings();loadProducts().then(function(){setTimeout(startCamera,500)});renderCart();
})();
</script>
</body>
</html>
