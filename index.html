<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<title>POS ร้านขายขนม</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@400;500;600;700;800;900&family=Space+Grotesk:wght@600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#f5f7fb; --card:#ffffff; --text:#111827; --muted:#6b7280; --line:#e5e7eb;
  --blue:#0a84ff; --green:#22c55e; --red:#ff3b30; --soft:#f8fafc; --nav:#ffffffcc;
  --shadow:0 12px 28px rgba(15,23,42,.08); --radius:22px;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;min-height:100%;font-family:'Noto Sans Thai',system-ui,sans-serif;background:var(--bg);color:var(--text)}
button,input{font:inherit}button{border:0;background:none;cursor:pointer}.num{font-family:'Space Grotesk','Noto Sans Thai',sans-serif;font-variant-numeric:tabular-nums}
#app{min-height:100dvh;display:flex;flex-direction:column;padding:22px 26px 86px;gap:16px}.top{display:flex;align-items:center;justify-content:space-between}.brand{display:flex;align-items:center;gap:14px}.brand-icon{font-size:38px;color:var(--blue);line-height:1}.brand h1{margin:0;font-size:28px;font-weight:900;line-height:1}.brand p{margin:3px 0 0;color:var(--muted);font-weight:600}.reload{border:1px solid var(--line);background:#fff;border-radius:999px;padding:11px 16px;color:var(--blue);font-weight:900;box-shadow:0 5px 14px rgba(0,0,0,.04)}
.main{flex:1;min-height:0;display:grid;grid-template-columns:minmax(0,1.35fr) 410px;gap:22px}.left,.cart{min-height:0}.left{display:flex;flex-direction:column;gap:18px}.search-area{position:relative;z-index:5}.search-box{height:76px;border:2px solid var(--blue);border-radius:12px;background:#fff;display:flex;align-items:center;gap:14px;padding:0 18px;box-shadow:0 0 0 4px rgba(10,132,255,.06)}.search-ico{font-size:32px;color:#64748b}.search-box input{flex:1;border:0;outline:0;font-size:24px;font-weight:700;min-width:0;background:transparent;color:#111827}.search-box input::placeholder{color:#8b95a5;font-weight:700}.clear-input{width:42px;height:42px;border-radius:50%;font-size:28px;color:#64748b}.suggest{position:absolute;top:76px;left:0;right:0;background:#fff;border:1px solid var(--line);border-radius:0 0 12px 12px;box-shadow:0 16px 34px rgba(15,23,42,.14);overflow:hidden;display:none}.suggest.show{display:block}.suggest-row{height:58px;display:grid;grid-template-columns:42px 1fr auto;align-items:center;gap:12px;padding:0 18px;border-bottom:1px solid #edf2f7;text-align:left;width:100%;background:#fff}.suggest-row:active{background:#f1f5f9}.suggest-row:last-child{border-bottom:0}.suggest-ico{font-size:23px;color:#64748b}.suggest-name{font-size:21px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.suggest-meta{color:#64748b;font-size:13px;font-weight:700;margin-top:1px}.suggest-arrow{font-size:23px;color:#64748b}.suggest-empty{padding:18px;color:var(--muted);font-weight:800;text-align:center;background:#fff}.hint-line{padding:9px 2px 0;color:var(--muted);font-weight:700;font-size:14px}.section-title{font-size:22px;font-weight:900;margin:4px 0 0}.grid{display:grid;grid-template-columns:repeat(4,minmax(120px,1fr));gap:14px}.product{background:#fff;border:1px solid var(--line);border-radius:12px;min-height:174px;padding:12px;display:flex;flex-direction:column;align-items:center;justify-content:space-between;text-align:center;box-shadow:0 3px 10px rgba(15,23,42,.03)}.product:active{transform:scale(.99);background:#f8fafc}.product.out{opacity:.45}.pic{width:76px;height:76px;border-radius:16px;background:linear-gradient(145deg,#eef6ff,#fff);display:flex;align-items:center;justify-content:center;font-size:42px}.pname{width:100%;font-size:15px;font-weight:800;line-height:1.25;min-height:38px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}.price{font-size:20px;color:#006fe6;font-weight:900}.stock{font-size:12px;color:var(--muted);font-weight:700}.all-btn{height:58px;border:1px solid #cfe0ff;background:#eef5ff;border-radius:12px;color:#006fe6;font-size:20px;font-weight:900}.cart{background:#fff;border:1px solid var(--line);border-radius:12px;box-shadow:var(--shadow);display:flex;flex-direction:column;overflow:hidden}.cart-head{height:80px;padding:0 20px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--line)}.cart-title{font-size:25px;font-weight:900;display:flex;align-items:center;gap:10px}.badge{background:#0a84ff;color:#fff;border-radius:999px;min-width:28px;height:28px;display:inline-flex;align-items:center;justify-content:center;font-size:15px}.trash{font-size:25px;color:var(--red);font-weight:900}.items{flex:1;overflow:auto;padding:0 16px}.empty{height:100%;min-height:260px;display:flex;align-items:center;justify-content:center;text-align:center;color:var(--muted);font-size:18px;font-weight:800}.cart-row{display:grid;grid-template-columns:58px 1fr auto;gap:12px;padding:18px 0;border-bottom:1px solid #edf2f7;align-items:start}.thumb{width:58px;height:58px;border-radius:12px;background:#eef6ff;display:flex;align-items:center;justify-content:center;font-size:30px}.ci-name{font-size:18px;font-weight:900;line-height:1.2}.ci-price{font-size:15px;color:var(--muted);font-weight:700;margin-top:4px}.qty{display:inline-grid;grid-template-columns:42px 40px 42px;border:1px solid var(--line);border-radius:10px;overflow:hidden;margin-top:12px;height:40px;background:#fff}.qty button{font-size:26px;color:#006fe6;font-weight:900}.qty span{display:flex;align-items:center;justify-content:center;font-weight:900;font-size:18px}.row-right{text-align:right}.remove{font-size:28px;color:#64748b;margin-bottom:30px}.subtotal{font-size:18px;font-weight:900}.summary{border-top:1px solid var(--line);padding:18px;background:#fff}.sum-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;font-size:17px;font-weight:700}.sum-row.muted{color:#374151}.net{display:flex;align-items:flex-end;justify-content:space-between;margin:14px 0 18px}.net .label{font-size:21px;font-weight:900}.net .amount{font-size:40px;color:#0a84ff;font-weight:900;line-height:1}.pay-cash{height:70px;width:100%;border-radius:10px;background:linear-gradient(135deg,#19b85c,#35d06f);color:#fff;font-size:23px;font-weight:900;display:flex;align-items:center;justify-content:space-between;padding:0 25px;box-shadow:0 9px 18px rgba(34,197,94,.22)}.pay-cash:disabled,.pay-qr:disabled{background:#cbd5e1;color:#64748b;box-shadow:none}.pay-qr{margin-top:12px;height:56px;width:100%;border-radius:10px;background:#0a84ff;color:#fff;font-size:18px;font-weight:900}.clear-cart-big{margin-top:12px;height:56px;width:100%;border:1px solid #cbd5e1;border-radius:10px;background:#fff;color:#374151;font-size:19px;font-weight:900}.bottom-nav{position:fixed;left:0;right:0;bottom:0;height:70px;background:var(--nav);backdrop-filter:blur(18px);border-top:1px solid var(--line);display:grid;grid-template-columns:repeat(4,1fr);z-index:20}.nav-item{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;color:#6b7280;font-weight:800}.nav-item.active{color:#0a84ff}.nav-item .nicon{font-size:24px}.overlay{position:fixed;inset:0;background:rgba(0,0,0,.36);z-index:50;display:none;align-items:center;justify-content:center}.overlay.show{display:flex}.sheet{width:100%;max-width:480px;background:#fff;border-radius:28px;padding:20px 20px calc(20px + env(safe-area-inset-bottom));box-shadow:0 -14px 40px rgba(0,0,0,.18)}.sheet-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}.sheet-head h3{margin:0;font-size:22px;font-weight:900}.x{font-size:24px;color:var(--muted);width:38px;height:38px;border-radius:50%;background:#f3f4f6}.cash-total,.qr-total{text-align:center;margin:8px 0 14px}.cash-total .amt,.qr-total .amt{font-size:42px;color:#0a84ff;font-weight:900}.cash-display{background:#f3f4f6;border-radius:22px;padding:16px;text-align:right;font-size:34px;font-weight:900;margin-bottom:8px}.change{text-align:right;min-height:22px;font-weight:900}.change.ok{color:var(--green)}.change.bad{color:var(--red)}.pad{display:grid;grid-template-columns:repeat(3,1fr);gap:9px;margin-top:12px}.pad button{background:#f3f4f6;border-radius:18px;padding:17px 0;font-size:22px;font-weight:900}.confirm{width:100%;border-radius:22px;padding:18px;margin-top:12px;background:#0a84ff;color:#fff;font-size:18px;font-weight:900}.confirm:disabled{background:#cbd5e1;color:#64748b}.qrwrap{display:flex;justify-content:center;margin:12px 0}.qrwrap img{width:260px;height:260px;object-fit:contain;border-radius:24px;border:1px solid var(--line)}.qrmiss{width:260px;height:260px;border:2px dashed var(--line);border-radius:24px;display:flex;align-items:center;justify-content:center;text-align:center;color:var(--muted);padding:18px}.success{text-align:center}.check{width:78px;height:78px;border-radius:50%;background:var(--green);color:#fff;display:flex;align-items:center;justify-content:center;font-size:42px;margin:4px auto 12px}.toast-wrap{position:fixed;top:14px;left:0;right:0;display:flex;justify-content:center;z-index:90;pointer-events:none}.toast{background:#111827;color:#fff;border-radius:999px;padding:12px 18px;font-weight:900;box-shadow:0 8px 24px rgba(0,0,0,.22)}.toast.error{background:var(--red)}.toast.success{background:var(--green)}.spinner{width:18px;height:18px;border:3px solid rgba(255,255,255,.4);border-top-color:#fff;border-radius:50%;display:inline-block;animation:spin .7s linear infinite;vertical-align:-3px;margin-right:6px}@keyframes spin{to{transform:rotate(360deg)}}
@media (max-width:900px),(orientation:portrait){#app{padding:16px 14px 86px}.main{display:flex;flex-direction:column}.grid{grid-template-columns:repeat(3,1fr)}.cart{min-height:520px}.search-box{height:66px}.search-box input{font-size:19px}.suggest{top:66px}.suggest-name{font-size:18px}.brand h1{font-size:23px}.brand-icon{font-size:32px}.reload{display:none}.overlay{align-items:flex-end}.sheet{border-radius:28px 28px 0 0}.cart-row{grid-template-columns:50px 1fr auto}.thumb{width:50px;height:50px}.grid{gap:10px}.product{min-height:158px;padding:10px}.pic{width:64px;height:64px}.bottom-nav{height:72px}}
</style>
</head>
<body>
<div id="app">
  <header class="top">
    <div class="brand"><div class="brand-icon">🛒</div><div><h1 id="shopNameLabel">ร้านขายขนม</h1><p>POS</p></div></div>
    <button class="reload" id="reloadBtn">รีเฟรชสินค้า</button>
  </header>
  <main class="main">
    <section class="left">
      <div class="search-area">
        <div class="search-box">
          <div class="search-ico">⌕</div>
          <input id="barcodeInput" type="text" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false" placeholder="สแกนบาร์โค้ด หรือ พิมพ์ค้นหาสินค้า" autofocus />
          <button class="clear-input" id="clearInputBtn">×</button>
        </div>
        <div class="suggest" id="suggestBox"></div>
        <div class="hint-line" id="scanStatus">กำลังโหลดสินค้า...</div>
      </div>
      <h2 class="section-title">สินค้าขายดี</h2>
      <div class="grid" id="popularGrid"></div>
      <button class="all-btn" id="showAllBtn">ดูสินค้าทั้งหมด</button>
    </section>
    <aside class="cart">
      <div class="cart-head"><div class="cart-title">ตะกร้าสินค้า <span class="badge" id="cartBadge">0</span></div><button class="trash" id="clearCartIcon">🗑️</button></div>
      <div class="items" id="cartItems"><div class="empty">สแกนสินค้าเพื่อเพิ่มเข้าตะกร้า</div></div>
      <div class="summary">
        <div class="sum-row muted"><span id="sumCount">รวม 0 รายการ</span><span class="num" id="sumSubtotal">0.00</span></div>
        <div class="sum-row muted"><span>ส่วนลด</span><span class="num">0.00</span></div>
        <div class="net"><div class="label">รวมสุทธิ</div><div class="amount num" id="totalAmount">0.00</div></div>
        <button class="pay-cash" id="payCashBtn" disabled><span>💵 รับเงิน</span><span class="num" id="cashBtnTotal">0.00</span></button>
        <button class="pay-qr" id="payQrBtn" disabled>📱 ชำระด้วย QR</button>
        <button class="clear-cart-big" id="clearCartBtn">↻ ล้างตะกร้า</button>
      </div>
    </aside>
  </main>
</div>
<nav class="bottom-nav">
  <div class="nav-item active"><div class="nicon">⌂</div><div>หน้าหลัก</div></div>
  <div class="nav-item"><div class="nicon">☷</div><div>ประวัติการขาย</div></div>
  <div class="nav-item"><div class="nicon">□</div><div>สินค้า</div></div>
  <div class="nav-item"><div class="nicon">⚙</div><div>ตั้งค่า</div></div>
</nav>
<div class="overlay" id="cashOverlay"><div class="sheet"><div class="sheet-head"><h3>รับเงินสด</h3><button class="x" id="closeCashBtn">×</button></div><div class="cash-total"><div>ยอดที่ต้องชำระ</div><div class="amt num" id="cashTotalLabel">฿0</div></div><div class="cash-display num" id="cashDisplay">0</div><div class="change" id="cashChange">&nbsp;</div><div class="pad"><button data-k="1">1</button><button data-k="2">2</button><button data-k="3">3</button><button data-k="4">4</button><button data-k="5">5</button><button data-k="6">6</button><button data-k="7">7</button><button data-k="8">8</button><button data-k="9">9</button><button id="exactBtn">พอดี</button><button data-k="0">0</button><button id="cashBackspace">⌫</button></div><button class="confirm" id="confirmCashBtn" disabled>ยืนยันรับเงิน</button></div></div>
<div class="overlay" id="qrOverlay"><div class="sheet"><div class="sheet-head"><h3>QR พร้อมเพย์</h3><button class="x" id="closeQrBtn">×</button></div><div class="qr-total"><div>ยอดที่ต้องชำระ</div><div class="amt num" id="qrTotalLabel">฿0</div></div><div class="qrwrap" id="qrImgWrap"></div><button class="confirm" id="confirmQrBtn">ลูกค้าชำระแล้ว ✓</button></div></div>
<div class="overlay" id="successOverlay"><div class="sheet success"><div class="check">✓</div><h3>ขายสำเร็จ</h3><p id="successSub">เลขที่ขาย —</p><button class="confirm" id="successCloseBtn">เริ่มรายการถัดไป</button></div></div>
<div class="toast-wrap" id="toast-wrap"></div>
<script>
(function(){'use strict';
var SCRIPT_URL=localStorage.getItem('pos_script_url')||(location.href.indexOf('/exec')>-1?location.href.split('?')[0]:'');
var products=[],productByBarcode={},cart={},cashEntered='',qrUrl='',lastAcceptedCode='',lastAcceptedTime=0;
function $(id){return document.getElementById(id)}
function money(n){return (Number(n)||0).toLocaleString('th-TH',{minimumFractionDigits:2,maximumFractionDigits:2})}
function THB(n){return '฿'+money(n)}
function show(id){$(id).classList.add('show')}function hide(id){$(id).classList.remove('show')}
function esc(s){return String(s||'').replace(/[&<>"']/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]})}
function toast(msg,type){var e=document.createElement('div');e.className='toast '+(type||'');e.textContent=msg;$('toast-wrap').appendChild(e);setTimeout(function(){e.remove()},2100)}
function beep(ok){try{var c=new(window.AudioContext||window.webkitAudioContext)(),o=c.createOscillator(),g=c.createGain();o.frequency.value=ok?1100:220;g.gain.value=.08;o.connect(g);g.connect(c.destination);o.start();setTimeout(function(){o.stop();c.close()},ok?70:180)}catch(e){}}
function api(a){return fetch(SCRIPT_URL+'?action='+a).then(function(r){return r.json()})}
function apiPost(p){return fetch(SCRIPT_URL,{method:'POST',headers:{'Content-Type':'text/plain;charset=utf-8'},body:JSON.stringify(p)}).then(function(r){return r.json()})}
function loadSettings(){if(!SCRIPT_URL)return;api('settings').then(function(res){if(res&&res.success){$('shopNameLabel').textContent=res.settings.ShopName||'ร้านขายขนม';qrUrl=res.settings.QRImageURL||'';renderQrImage(qrUrl)}}).catch(function(){})}
function loadProducts(){if(!SCRIPT_URL){$('scanStatus').textContent='กรุณาเปิดผ่าน Web App URL ของ Apps Script';toast('ให้เปิดผ่าน Web App URL ของ Apps Script','error');return Promise.resolve()}$('scanStatus').textContent='กำลังโหลดสินค้า...';return api('products').then(function(res){if(res&&res.success){products=res.products||[];productByBarcode={};products.forEach(function(p){if(p.barcode!==undefined&&p.barcode!==null&&String(p.barcode).trim())productByBarcode[String(p.barcode).trim()]=p});$('scanStatus').textContent='พร้อมสแกนหรือค้นหา';renderPopular();renderSuggestions('',true);focusInput()}else{throw new Error((res&&res.error)||'โหลดสินค้าไม่สำเร็จ')}}).catch(function(err){$('scanStatus').textContent='โหลดสินค้าไม่สำเร็จ';toast(String(err.message||err),'error')})}
function productIcon(p){var n=String(p.name||'').toLowerCase();if(n.includes('pepsi')||n.includes('เป๊ป')||n.includes('ชา')||n.includes('อิชิตัน')||n.includes('น้ำ'))return '🥤';if(n.includes('มาม่า')||n.includes('ปูไทย')||n.includes('เลย์')||n.includes('ขนม'))return '🍿';return '🛍️'}
function productMatches(p,q){q=String(q||'').trim().toLowerCase();if(!q)return true;return String(p.name||'').toLowerCase().includes(q)||String(p.barcode||'').includes(q)||String(p.id||'').toLowerCase().includes(q)}
function renderPopular(){var grid=$('popularGrid');var list=products.slice(0,8);if(!list.length){grid.innerHTML='<div class="suggest-empty">ยังไม่มีสินค้า</div>';return}grid.innerHTML='';list.forEach(function(p){var b=document.createElement('button');b.className='product '+(Number(p.stock||0)<=0?'out':'');b.innerHTML='<div class="pic">'+productIcon(p)+'</div><div class="pname">'+esc(p.name)+'</div><div class="price num">'+money(p.price)+'</div><div class="stock">เหลือ '+Number(p.stock||0)+'</div>';b.onclick=function(){tryAddProduct(p)};grid.appendChild(b)})}
function renderSuggestions(q,initial){var box=$('suggestBox');q=String(q||'').trim();var list=products.filter(function(p){return productMatches(p,q)}).slice(0,q?8:7);if(!q&&!initial){box.classList.remove('show');return}if(!list.length){box.innerHTML='<div class="suggest-empty">ไม่พบสินค้า</div>';box.classList.add('show');return}box.innerHTML='';if(q){var first=document.createElement('button');first.className='suggest-row';first.innerHTML='<div class="suggest-ico">◴</div><div><div class="suggest-name">'+esc(q)+'</div><div class="suggest-meta">กด Enter ถ้าเป็นบาร์โค้ด</div></div><div class="suggest-arrow">×</div>';first.onclick=function(){$('barcodeInput').value='';renderSuggestions('',false);focusInput()};box.appendChild(first)}list.forEach(function(p){var row=document.createElement('button');row.className='suggest-row';row.innerHTML='<div class="suggest-ico">⌕</div><div><div class="suggest-name">'+esc(p.name)+'</div><div class="suggest-meta num">'+esc(p.barcode||'ไม่มีบาร์โค้ด')+' • '+money(p.price)+'</div></div><div class="suggest-arrow">↖</div>';row.onclick=function(){tryAddProduct(p);$('barcodeInput').value='';renderSuggestions('',false);focusInput()};box.appendChild(row)});box.classList.add('show')}
function isValidEAN13(code){code=String(code||'').trim();if(!/^\d{13}$/.test(code))return false;var sum=0;for(var i=0;i<12;i++){var n=Number(code[i]);sum+=(i%2===0)?n:n*3}var check=(10-(sum%10))%10;return check===Number(code[12])}
function acceptCooldown(code){var now=Date.now();if(code===lastAcceptedCode&&now-lastAcceptedTime<900)return false;lastAcceptedCode=code;lastAcceptedTime=now;return true}
function submitInput(){var v=$('barcodeInput').value.trim();if(!v)return;var p=productByBarcode[v];if(p){if(!acceptCooldown(v))return;tryAddProduct(p);$('barcodeInput').value='';renderSuggestions('',false);return}if(/^\d+$/.test(v)){if(v.length===13&&!isValidEAN13(v)){toast('บาร์โค้ดไม่ผ่าน EAN-13 checksum','error');beep(false)}else{toast('ไม่พบสินค้า '+v,'error');beep(false)}$('barcodeInput').select();return}var list=products.filter(function(p){return productMatches(p,v)});if(list.length===1){tryAddProduct(list[0]);$('barcodeInput').value='';renderSuggestions('',false)}else{renderSuggestions(v,false)}}
function tryAddProduct(p){if(Number(p.stock||0)<=0){toast('สินค้าหมด','error');beep(false);return}addToCart(p)}
function cartArray(){return Object.keys(cart).map(function(k){return cart[k]})}function count(){return cartArray().reduce(function(s,i){return s+i.qty},0)}function total(){return cartArray().reduce(function(s,i){return s+i.qty*i.price},0)}
function addToCart(p){var id=String(p.id),ex=cart[id],q=ex?ex.qty:0;if(q+1>Number(p.stock||0)){toast('สินค้าในสต็อกไม่พอ','error');beep(false);return}if(ex)ex.qty++;else cart[id]={id:id,name:p.name,price:Number(p.price||0),stock:Number(p.stock||0),qty:1,barcode:p.barcode||''};renderCart();$('scanStatus').textContent='เพิ่ม '+p.name;toast('เพิ่ม '+p.name,'success');beep(true);focusInput()}
function changeQty(id,d){var it=cart[id];if(!it)return;var nq=it.qty+d;if(nq<=0)delete cart[id];else if(nq>it.stock){toast('สินค้าในสต็อกไม่พอ','error');return}else it.qty=nq;renderCart();focusInput()}
function removeItem(id){delete cart[id];renderCart();focusInput()}
function renderCart(){var arr=cartArray(),wrap=$('cartItems');$('cartBadge').textContent=count();$('sumCount').textContent='รวม '+count()+' รายการ';$('sumSubtotal').textContent=money(total());$('totalAmount').textContent=money(total());$('cashBtnTotal').textContent=money(total());$('payCashBtn').disabled=count()===0;$('payQrBtn').disabled=count()===0;if(!arr.length){wrap.innerHTML='<div class="empty">สแกนสินค้าเพื่อเพิ่มเข้าตะกร้า</div>';return}wrap.innerHTML='';arr.forEach(function(i){var r=document.createElement('div');r.className='cart-row';r.innerHTML='<div class="thumb">'+productIcon(i)+'</div><div><div class="ci-name">'+esc(i.name)+'</div><div class="ci-price num">'+money(i.price)+'</div><div class="qty"><button class="minus">−</button><span>'+i.qty+'</span><button class="plus">+</button></div></div><div class="row-right"><button class="remove">×</button><div class="subtotal num">'+money(i.price*i.qty)+'</div></div>';r.querySelector('.minus').onclick=function(){changeQty(i.id,-1)};r.querySelector('.plus').onclick=function(){changeQty(i.id,1)};r.querySelector('.remove').onclick=function(){removeItem(i.id)};wrap.appendChild(r)})}
function clearCart(){if(count()&&confirm('ล้างตะกร้า?')){cart={};renderCart();focusInput()}}
function renderQrImage(url){$('qrImgWrap').innerHTML=url?'<img src="'+esc(url)+'" alt="QR">':'<div class="qrmiss">ยังไม่ได้ใส่ QRImageURL ในชีต Settings</div>'}
function updateCash(){var v=Number(cashEntered||0),diff=v-total();$('cashDisplay').textContent=v.toLocaleString('th-TH');var ch=$('cashChange');if(!cashEntered){ch.innerHTML='&nbsp;';ch.className='change'}else if(diff>=0){ch.textContent='เงินทอน '+THB(diff);ch.className='change ok'}else{ch.textContent='ยังขาด '+THB(-diff);ch.className='change bad'}$('confirmCashBtn').disabled=diff<0}
function checkout(type){var items=cartArray().map(function(i){return{id:i.id,qty:i.qty}});if(!items.length)return;var btn=type==='cash'?$('confirmCashBtn'):$('confirmQrBtn'),old=btn.textContent;btn.disabled=true;btn.innerHTML='<span class="spinner"></span>กำลังบันทึก';apiPost({action:'checkout',items:items,paymentType:type}).then(function(res){if(res&&res.success){hide('cashOverlay');hide('qrOverlay');$('successSub').textContent='เลขที่ขาย '+res.saleId+' • '+(type==='cash'?'เงินสด':'QR');show('successOverlay');(res.items||[]).forEach(function(line){var p=products.find(function(x){return String(x.id)===String(line.id)});if(p)p.stock-=line.qty});cart={};renderCart();renderPopular()}else{toast((res&&res.error)||'ทำรายการไม่สำเร็จ','error');if(res&&res.insufficient)loadProducts()}}).catch(function(){toast('เชื่อมต่อไม่สำเร็จ','error')}).finally(function(){btn.disabled=false;btn.textContent=old;focusInput()})}
function focusInput(){setTimeout(function(){try{$('barcodeInput').focus({preventScroll:true})}catch(e){$('barcodeInput').focus()}},80)}
$('barcodeInput').addEventListener('input',function(){renderSuggestions(this.value,false)});
$('barcodeInput').addEventListener('keydown',function(e){if(e.key==='Enter'){e.preventDefault();submitInput()}});
$('barcodeInput').addEventListener('focus',function(){renderSuggestions(this.value,true)});
document.addEventListener('click',function(e){if(!e.target.closest('.search-area')&&!e.target.closest('.overlay')){$('suggestBox').classList.remove('show');focusInput()}});
$('clearInputBtn').onclick=function(){$('barcodeInput').value='';renderSuggestions('',false);focusInput()};
$('showAllBtn').onclick=function(){renderSuggestions('',true);focusInput()};$('reloadBtn').onclick=loadProducts;$('clearCartBtn').onclick=clearCart;$('clearCartIcon').onclick=clearCart;
$('payCashBtn').onclick=function(){cashEntered='';$('cashTotalLabel').textContent=THB(total());updateCash();show('cashOverlay')};$('closeCashBtn').onclick=function(){hide('cashOverlay');focusInput()};
document.querySelectorAll('.pad button[data-k]').forEach(function(b){b.onclick=function(){if(cashEntered.length<10){cashEntered+=this.getAttribute('data-k');updateCash()}}});$('cashBackspace').onclick=function(){cashEntered=cashEntered.slice(0,-1);updateCash()};$('exactBtn').onclick=function(){cashEntered=String(total());updateCash()};$('confirmCashBtn').onclick=function(){checkout('cash')};
$('payQrBtn').onclick=function(){$('qrTotalLabel').textContent=THB(total());renderQrImage(qrUrl);show('qrOverlay')};$('closeQrBtn').onclick=function(){hide('qrOverlay');focusInput()};$('confirmQrBtn').onclick=function(){checkout('qr')};$('successCloseBtn').onclick=function(){hide('successOverlay');focusInput()};
loadSettings();loadProducts();renderCart();focusInput();
})();
</script>
</body>
</html>
